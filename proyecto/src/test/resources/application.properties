# JWT properties for test context (needed by JwtSecurityProperties → JwtService → JwtAuthenticationFilter)
app.security.jwt.secret=test-secret-key-at-least-32-characters-for-hs256-algorithm-test
app.security.jwt.expiration=1h

# Disable UserDetailsService auto-configuration (same as main profile)
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

# Use in-memory profile for tests (no JPA)
spring.profiles.active=memory
