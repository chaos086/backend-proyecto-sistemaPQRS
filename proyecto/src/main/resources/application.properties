spring.application.name=proyecto

# Seguridad: sin UserDetailsService autogenerado (usuario por defecto); todo explícito en SecurityConfiguration
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

# Base de datos H2 (credenciales auth_usuarios + uso nativo desde JPA)
spring.datasource.url=jdbc:h2:mem:proyectodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.h2.console.enabled=true

# JWT (Bearer), vida media ~4 h con claim exp
app.security.jwt.secret=desarrollo-cambiar-en-produccion-minimo-32-caracteres-seguros-hs256!!
app.security.jwt.expiration=4h

# OpenAPI / Swagger UI (también el valor por defecto de springdoc)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Debug logging
logging.level.co.edu.uniquindio=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.core=DEBUG
logging.level.springdoc=DEBUG
logging.level.io.swagger.v3=DEBUG
logging.level.com.fasterxml.jackson=DEBUG
