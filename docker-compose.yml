services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pqrsdb
      POSTGRES_USER: pqrsuser
      POSTGRES_PASSWORD: pqrspass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pqrsuser -d pqrsdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=jpa,prod
      - APP_SECURITY_JWT_SECRET=produccion-cambiar-minimo-32-caracteres-seguros-hs256
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
